<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprende Japonés - Ejercicios</title>
    <!-- Tailwind CSS para estilos rápidos y limpios -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts para una tipografía limpia y soporte japonés -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Nunito', 'sans-serif'],
                        jp: ['Noto Sans JP', 'sans-serif'],
                    },
                    colors: {
                        dark: '#121212',
                        darker: '#0a0a0a',
                        card: '#1e1e1e',
                        primary: '#6366f1', // Indigo
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #121212;
            color: #f3f4f6;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Estilos para Furigana */
        ruby {
            ruby-align: center;
        }
        rt {
            font-size: 0.6rem;
            color: #9ca3af; /* gray-400 */
            user-select: none;
        }

        /* Animaciones suaves */
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Estilos de tarjetas */
        .card-draggable {
            touch-action: none; /* Previene scroll al arrastrar en movil si se usa drag nativo */
            transition: all 0.2s;
        }
        .card-draggable:active { transform: scale(0.95); }
        .card-draggable.selected {
            box-shadow: 0 0 0 2px #6366f1;
            transform: translateY(-2px);
        }
        .card-draggable.dragging {
            opacity: 0.5;
        }

        .drop-zone {
            transition: all 0.2s;
        }
        .drop-zone.drag-over {
            background-color: #374151; /* gray-700 */
            border-color: #6366f1;
        }

        /* Inputs para el modo escritura */
        .jp-input {
            font-family: 'Noto Sans JP', 'Nunito', sans-serif;
            text-align: center;
            font-size: 1.25rem;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans">

    <!-- Header / Nav -->
    <header class="bg-darker border-b border-gray-800 p-4 sticky top-0 z-10">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <h1 class="text-xl font-bold flex items-center gap-2 cursor-pointer" onclick="app.showView('menu')">
                <span class="text-primary text-2xl">🇯🇵</span> NihongoApp
            </h1>
            <div id="header-actions" class="hidden flex items-center gap-2">
                <button onclick="app.showView('menu')" class="text-sm bg-gray-800 hover:bg-gray-700 px-3 py-1.5 rounded-lg transition-colors">
                    Ir al Menú
                </button>
            </div>
        </div>
    </header>

    <!-- Contenedor Principal -->
    <main class="flex-grow w-full max-w-4xl mx-auto p-4 sm:p-6 lg:p-8 flex flex-col relative">

        <!-- VISTA 1: Menú Principal -->
        <section id="view-menu" class="fade-in w-full">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
                <div>
                    <h2 class="text-2xl font-bold text-gray-200">Elige un ejercicio</h2>
                    <p class="text-sm text-gray-400">Completa desafíos en dirección Normal 🇪🇸➔🇯🇵 e Invertida 🇯🇵➔🇪🇸 para ganar estrellas.</p>
                </div>
                <button onclick="app.clearProgress()" class="text-xs bg-red-900/20 hover:bg-red-900/40 text-red-400 border border-red-900/50 px-3 py-1.5 rounded-lg transition-colors self-start sm:self-auto">
                    Restablecer Progreso
                </button>
            </div>
            <div id="exercises-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                <!-- Se inyecta por JS -->
            </div>
        </section>

        <!-- VISTA 2: Ventana de Teoría -->
        <section id="view-theory" class="fade-in w-full hidden">
            <button onclick="app.showView('menu')" class="mb-6 text-gray-400 hover:text-white flex items-center gap-1 text-sm transition-colors">
                ← Volver al Menú
            </button>
            <div class="bg-card rounded-2xl p-6 border border-gray-800 shadow-xl max-w-2xl mx-auto">
                <div class="text-center mb-6">
                    <span id="theory-icon" class="text-5xl mb-2 block">📅</span>
                    <h2 id="theory-title" class="text-3xl font-bold text-gray-100">...</h2>
                    <p id="theory-desc" class="text-gray-400 text-sm mt-1">Repasa el vocabulario y sus conceptos antes de practicar.</p>
                </div>

                <!-- Bloque de Explicaciones Detalladas (Se inyecta dinámicamente si el ejercicio tiene teoría explicativa) -->
                <div id="theory-explanations" class="mb-6 space-y-4 hidden">
                    <!-- Tarjetas de explicación una a una inyectadas por JS -->
                </div>

                <!-- Tabla de estudio (Resumen) -->
                <div class="overflow-x-auto mb-6 rounded-xl border border-gray-800 bg-darker">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <!-- Las cabeceras se adaptan dinámicamente por JS -->
                        </thead>
                        <tbody id="theory-table-body" class="divide-y divide-gray-800 text-gray-200 text-sm">
                            <!-- Filas inyectadas por JS -->
                        </tbody>
                    </table>
                </div>

                <!-- Notas Adicionales -->
                <div id="theory-notes-box" class="bg-darker/50 border border-gray-800 rounded-xl p-4 mb-6 text-sm text-gray-300 leading-relaxed">
                    <!-- Notas inyectadas por JS -->
                </div>

                <!-- Botón de Comenzar -->
                <div class="flex justify-center">
                    <button id="btn-start-practice" class="bg-primary hover:bg-indigo-500 text-white font-bold py-3.5 px-10 rounded-xl shadow-lg transition transform hover:scale-105 w-full sm:w-auto flex items-center justify-center gap-2">
                        ¡Comenzar Práctica! 🚀
                    </button>
                </div>
            </div>
        </section>

        <!-- VISTA 3: El Ejercicio (Drag & Drop / Writing) -->
        <section id="view-exercise" class="fade-in w-full hidden flex-col flex-grow">
            <!-- Botón de vuelta rápida a la teoría -->
            <button onclick="app.showView('theory', app.state.exerciseId)" class="mb-4 text-gray-400 hover:text-white flex items-center gap-1 text-xs transition-colors self-start">
                ← Repasar Teoría
            </button>

            <!-- Encabezado con información del ejercicio y selectores -->
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6 border-b border-gray-800 pb-5">
                <div>
                    <h2 id="ex-title" class="text-2xl font-bold text-gray-100">...</h2>
                    <div class="flex items-center gap-2 mt-1">
                        <p id="ex-subtitle" class="text-sm text-gray-400">Practica ordenando las tarjetas correspondientes.</p>
                    </div>
                </div>
                
                <div class="flex flex-col sm:flex-row gap-3">
                    <!-- Dirección del Ejercicio (Modo Invertido) -->
                    <div class="flex bg-darker p-1 rounded-xl border border-gray-800">
                        <button id="btn-mode-normal" onclick="app.toggleInverted(false)" class="px-3 py-1.5 rounded-lg text-xs font-bold transition-all whitespace-nowrap">
                            🇪🇸 ➔ 🇯🇵 Normal
                        </button>
                        <button id="btn-mode-inverted" onclick="app.toggleInverted(true)" class="px-3 py-1.5 rounded-lg text-xs font-bold transition-all whitespace-nowrap">
                            🇯🇵 ➔ 🇪🇸 Invertido
                        </button>
                    </div>
                    <!-- Pestañas de Dificultad Dinámicas -->
                    <div class="flex bg-darker p-1 rounded-xl border border-gray-800 overflow-x-auto max-w-full" id="difficulty-tabs-container">
                        <!-- Los botones de dificultad se inyectan aquí -->
                    </div>
                </div>
            </div>

            <!-- Área de Huecos (Destinos) -->
            <div class="bg-card rounded-2xl p-4 sm:p-6 border border-gray-800 shadow-lg mb-6 flex-grow">
                <div id="slots-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3">
                    <!-- Los huecos se inyectan aquí (se adapta automáticamente a 10 elementos) -->
                </div>
            </div>

            <!-- Área de Tarjetas (Origen) -->
            <div id="cards-container-wrapper" class="bg-darker rounded-2xl p-4 sm:p-6 border border-gray-800 border-dashed">
                <div class="flex items-center justify-between mb-3">
                    <p class="text-xs text-gray-500 uppercase tracking-wider font-bold">Tarjetas disponibles (Toca o arrastra)</p>
                    <button onclick="app.resetExercise()" class="text-xs text-gray-400 hover:text-white flex items-center gap-1">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        Reiniciar
                    </button>
                </div>
                <div id="cards-container" class="flex flex-wrap justify-center gap-3 min-h-[4rem]">
                    <!-- Las tarjetas se inyectan aquí -->
                </div>
            </div>

            <!-- Botón de comprobación -->
            <div class="mt-6 flex justify-center">
                <button id="btn-check" onclick="app.checkAnswers()" class="bg-primary hover:bg-indigo-500 text-white font-bold py-3.5 px-8 rounded-xl shadow-lg transition transform hover:scale-105 w-full sm:w-auto">
                    Comprobar respuestas
                </button>
            </div>
            
            <!-- Mensaje de Feedback -->
            <div id="feedback-message" class="hidden mt-4 p-4 rounded-xl text-center font-bold text-lg">
            </div>
        </section>

    </main>

            // --- GESTIÓN DE PROGRESO CON LOCAL STORAGE ---
            getProgressKey: function(exId, diff, inverted) {
                return `nihongo_progress_${exId}_${diff}_${inverted ? 'inv' : 'normal'}`;
            },

            markAsCompleted: function(exId, diff, inverted) {
                const key = this.getProgressKey(exId, diff, inverted);
                localStorage.setItem(key, 'true');
            },

            isCompleted: function(exId, diff, inverted) {
                return localStorage.getItem(this.getProgressKey(exId, diff, inverted)) === 'true';
            },

            clearProgress: function() {
                // Elimina únicamente el progreso de esta app
                Object.keys(localStorage).forEach(key => {
                    if (key.startsWith('nihongo_progress_')) {
                        localStorage.removeItem(key);
                    }
                });
                this.renderMenu();
            },

            // Navegación de pantallas
            showView: function(viewName, exerciseId = null) {
                document.getElementById('view-menu').classList.add('hidden');
                document.getElementById('view-theory').classList.add('hidden');
                document.getElementById('view-exercise').classList.add('hidden');
                document.getElementById('header-actions').classList.add('hidden');

                this.state.view = viewName;

                if (viewName === 'menu') {
                    document.getElementById('view-menu').classList.remove('hidden');
                    this.renderMenu();
                } 
                else if (viewName === 'theory') {
                    this.state.exerciseId = exerciseId || this.state.exerciseId;
                    document.getElementById('header-actions').classList.remove('hidden');
                    document.getElementById('view-theory').classList.remove('hidden');
                    this.renderTheory();

            // 1. Renderizar el menú principal en cuadrícula con badges de logros

                const grid = document.getElementById('exercises-grid');
                grid.innerHTML = '';

                EXERCISES_DATA.forEach(ex => {
                    const card = document.createElement('div');
                    card.className = 'bg-card border border-gray-800 rounded-2xl p-5 cursor-pointer hover:border-primary transition transform hover:-translate-y-1 shadow-lg flex flex-col justify-between h-[16.5rem]';
                    card.onclick = () => this.showView('theory', ex.id);

                    // Generar mini medallas de logros para cada dificultad permitida
                    let achievementsHtml = '<div class="flex gap-1.5 flex-wrap mt-2">';
                    const diffColors = { easy: '🟢', medium: '🟡', hard: '🔴', writing: '⌨️' };
                    const diffNames = { easy: 'Fácil', medium: 'Medio', hard: 'Difícil', writing: 'Escribir' };

                    ex.allowedDifficulties.forEach(diff => {
                        const normalDone = this.isCompleted(ex.id, diff, false);
                        const invertedDone = this.isCompleted(ex.id, diff, true);
                        
                        let badgeClass = 'bg-darker/60 border border-gray-800 text-gray-500';
                        let checkSymbol = '';
                        
                        if (normalDone && invertedDone) {
                            // Completado en ambos sentidos -> Medalla de Oro brillante
                            badgeClass = 'bg-yellow-500/10 border-yellow-500/80 text-yellow-400 font-extrabold shadow-[0_0_8px_rgba(234,179,8,0.2)]';
                            checkSymbol = '⭐';
                        } else if (normalDone || invertedDone) {
                            // Completado en un sentido -> Medalla plata/bronce
                            badgeClass = 'bg-primary/10 border-primary/50 text-indigo-300 font-semibold';
                            checkSymbol = '✓';
                        }

                        achievementsHtml += `
                            <span class="text-[10px] px-2 py-0.5 rounded-full border flex items-center gap-1 ${badgeClass}" title="${diffNames[diff]}: ${normalDone ? 'Normal ✓' : 'Normal ✗'} | ${invertedDone ? 'Invertido ✓' : 'Invertido ✗'}">
                                <span>${diffColors[diff]}</span>
                                <span>${checkSymbol}</span>
                            </span>
                        `;
                    });
                    achievementsHtml += '</div>';

                    card.innerHTML = `
                        <div>
                            <div class="flex justify-between items-start mb-3">
                                <div class="text-4xl group-hover:scale-110 transition-transform origin-left">${ex.icon}</div>
                            </div>
                            <h3 class="text-lg font-bold text-gray-100">${ex.title}</h3>
                            <p class="text-xs text-gray-400 mt-1 line-clamp-2">${ex.desc}</p>
                        </div>
                        <div>
                            <div class="text-[10px] text-gray-500 uppercase font-bold tracking-wider mb-1">Medallas:</div>
                            ${achievementsHtml}
                        </div>
                    `;
                    grid.appendChild(card);
                });
            },

            // 3. Iniciar el Ejercicio interactivo
            startExercise: function(difficulty) {
                this.state.difficulty = difficulty;
                this.state.selectedCard = null;
                const ex = EXERCISES_DATA.find(e => e.id === this.state.exerciseId);
                
                document.getElementById('ex-title').textContent = ex.title;
                
                // Actualizar interfaz del switch de dirección
                this.updateInvertedModeUI();

                const feedback = document.getElementById('feedback-message');
                feedback.classList.add('hidden');
                document.getElementById('btn-check').classList.remove('hidden');

                // Mostrar u ocultar contenedor de tarjetas según el modo
                const cardsWrapper = document.getElementById('cards-container-wrapper');
                if (difficulty === 'writing') {
                    cardsWrapper.classList.add('hidden');
                } else {
                    cardsWrapper.classList.remove('hidden');
                }

                // Generar pestañas de dificultad
                this.renderDifficultyTabs(ex);

                // Renderizar slots (Destinos)
                this.renderSlots(ex.items, difficulty);

                // Renderizar tarjetas (Origen)
                if (difficulty !== 'writing') {
                    this.renderCards(ex.items, difficulty);
                }

                this.showView('exercise');
            },

            // Alternar modo invertido (Español <-> Japonés)
            toggleInverted: function(isInverted) {
                this.state.inverted = isInverted;
                this.startExercise(this.state.difficulty);
            },

            updateInvertedModeUI: function() {
                const btnNormal = document.getElementById('btn-mode-normal');
                const btnInverted = document.getElementById('btn-mode-inverted');
                
                if (this.state.inverted) {
                    btnNormal.className = 'px-3 py-1.5 rounded-lg text-xs font-bold transition-all whitespace-nowrap text-gray-400 hover:text-white';
                    btnInverted.className = 'px-3 py-1.5 rounded-lg text-xs font-bold transition-all whitespace-nowrap bg-indigo-600 text-white shadow-md';
                } else {
                    btnNormal.className = 'px-3 py-1.5 rounded-lg text-xs font-bold transition-all whitespace-nowrap bg-indigo-600 text-white shadow-md';
                    btnInverted.className = 'px-3 py-1.5 rounded-lg text-xs font-bold transition-all whitespace-nowrap text-gray-400 hover:text-white';
                }
            },

            resetExercise: function() {
                this.startExercise(this.state.difficulty);
            },

            renderDifficultyTabs: function(ex) {
                const container = document.getElementById('difficulty-tabs-container');
                container.innerHTML = '';

                const meta = {
                    easy: { name: '🟢 Fácil', desc: 'Ayuda visual completa' },
                    medium: { name: '🟡 Medio', desc: 'Con lectura, sin pistas' },
                    hard: { name: '🔴 Difícil', desc: 'Solo caracteres directos' },
                    writing: { name: '⌨️ Escribir', desc: 'Escritura manual' }
                };

                ex.allowedDifficulties.forEach(diff => {
                    const btn = document.createElement('button');
                    const isActive = diff === this.state.difficulty;
                    btn.className = `px-3.5 py-1.5 rounded-lg text-xs font-bold transition-all whitespace-nowrap ${
                        isActive 
                            ? 'bg-primary text-white shadow-md' 
                            : 'text-gray-400 hover:text-white hover:bg-gray-800'
                    }`;
                    btn.textContent = meta[diff].name;
                    btn.title = meta[diff].desc;
                    btn.onclick = () => this.startExercise(diff);
                    container.appendChild(btn);
                });
            },

            shuffle: function(array) {
                let currentIndex = array.length, randomIndex;
                while (currentIndex !== 0) {
                    randomIndex = Math.floor(Math.random() * currentIndex);
                    currentIndex--;
                    [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
                }
                return array;
            },

            // Helper para obtener el texto del slot de forma dinámica según el modo e idioma
            getSlotLabelHtml: function(item, difficulty) {
                if (!this.state.inverted) {
                    // Modo Normal: El slot te muestra el concepto en Español
                    return item.es;
                } else {
                    // Modo Invertido: El slot te muestra el concepto en Japonés
                    if (difficulty === 'easy') {
                        let inner = item.furigana ? `<ruby>${item.kanji}<rt>${item.furigana}</rt></ruby>` : item.kanji;
                        if (item.emoji) inner += ` <span class="text-base ml-1">${item.emoji}</span>`;
                        return inner;
                    } else if (difficulty === 'medium') {
                        return item.furigana ? `<ruby>${item.kanji}<rt>${item.furigana}</rt></ruby>` : item.kanji;
                    } else {
                        return item.kanji;
                    }
                }
            },

            // Renderizar huecos de destino
            renderSlots: function(items, difficulty) {
                const container = document.getElementById('slots-container');
                container.innerHTML = '';

                items.forEach((item, index) => {
                    const slotWrap = document.createElement('div');
                    slotWrap.className = 'flex flex-col bg-darker rounded-xl border border-gray-800 overflow-hidden';
                    
                    // Etiqueta del slot (Español o Japonés según modo de dirección)
                    const label = document.createElement('div');
                    label.className = 'bg-gray-800/50 text-center py-2 px-3 text-sm font-bold text-gray-300 border-b border-gray-800 font-jp min-h-[2.5rem] flex items-center justify-center';
                    label.innerHTML = this.getSlotLabelHtml(item, difficulty);
                    slotWrap.appendChild(label);

                    // Hueco interactivo
                    const slot = document.createElement('div');
                    
                    // Asignar respuestas esperadas dependiendo de la dirección
                    if (!this.state.inverted) {
                        slot.dataset.expected = item.kanji; 
                        slot.dataset.altExpected = item.furigana; 
                    } else {
                        slot.dataset.expected = item.es;
                        slot.dataset.altExpected = ''; 
                    }
                    
                    if (difficulty === 'writing') {
                        slot.className = 'p-3 flex-grow flex items-center justify-center';
                        slot.innerHTML = `<input type="text" placeholder="${this.state.inverted ? 'Escribe en español...' : 'Escribe en japonés...'}" class="jp-input w-full bg-transparent border-b-2 border-gray-700 focus:border-primary outline-none text-white p-2 transition-colors">`;
                    } else {
                        slot.className = 'drop-zone flex-grow min-h-[4rem] p-2 flex items-center justify-center relative cursor-pointer';
                        slot.dataset.slotId = index;
                        
                        // Drag & Drop PC
                        slot.addEventListener('dragover', e => { e.preventDefault(); slot.classList.add('drag-over'); });
                        slot.addEventListener('dragleave', () => slot.classList.remove('drag-over'));
                        slot.addEventListener('drop', e => this.handleDrop(e, slot));
                        
                        // Tap-to-move Móvil
                        slot.addEventListener('click', () => this.handleSlotClick(slot));
                    }
                    
                    slotWrap.appendChild(slot);
                    container.appendChild(slotWrap);
                });
            },

            // Renderizar las tarjetas de origen
            renderCards: function(items, difficulty) {
                const container = document.getElementById('cards-container');
                container.innerHTML = '';
                
                const shuffledItems = this.shuffle([...items]);

                shuffledItems.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card-draggable font-jp bg-gray-800 border-2 border-gray-700 rounded-xl px-4 py-2.5 cursor-pointer shadow flex items-center justify-center gap-2 select-none min-w-[5.5rem] text-center';
                    
                    // Solo el Modo Fácil normal tiene colores de pista representativos
                    if (difficulty === 'easy' && !this.state.inverted) {
                        card.classList.add(item.color, item.bg);
                    }

                    // Construcción del contenido interno según la dirección del juego
                    let cardValue = '';
                    let content = '';

                    if (!this.state.inverted) {
                        // Modo Normal: Arrastramos Tarjetas en Japonés
                        cardValue = item.kanji;
                        content += `<span class="text-base font-bold">`;
                        if (difficulty === 'easy' || difficulty === 'medium') {
                            if (item.furigana && item.furigana !== item.kanji) {
                                content += `<ruby>${item.kanji}<rt>${item.furigana}</rt></ruby>`;
                            } else {
                                content += item.kanji;
                            }
                        } else {
                            content += item.kanji;
                        }
                        content += `</span>`;
                        
                        if (difficulty === 'easy' && item.emoji) {
                            content += `<span class="text-lg ml-1">${item.emoji}</span>`;
                        }
                    } else {
                        // Modo Invertido: Arrastramos Tarjetas en Español
                        cardValue = item.es;
                        content += `<span class="text-sm font-semibold font-sans">${item.es}</span>`;
                    }

                    card.innerHTML = content;
                    card.dataset.value = cardValue;
                    
                    // Drag PC
                    card.draggable = true;
                    card.addEventListener('dragstart', e => {
                        e.dataTransfer.setData('text/plain', cardValue);
                        card.classList.add('dragging');
                        this.state.selectedCard = card;
                    });
                    card.addEventListener('dragend', () => {
                        card.classList.remove('dragging');
                        this.clearSelection();
                    });

                    // Click/Touch móvil
                    card.addEventListener('click', (e) => {
                        e.stopPropagation();
                        this.handleCardClick(card);
                    });

                    container.appendChild(card);
                });
            },

            // --- LÓGICA DE MOVIMIENTO DE TARJETAS ---

            returnCardToPool: function(card) {
                card.style.width = '';
                card.style.height = '';
                
                // Restablecer estilos bases limpios de veredicto
                if (!this.state.inverted) {
                    card.className = 'card-draggable font-jp bg-gray-800 border-2 border-gray-700 rounded-xl px-4 py-2.5 cursor-pointer shadow flex items-center justify-center gap-2 select-none min-w-[5.5rem] text-center';
                    if (this.state.difficulty === 'easy') {
                        const ex = EXERCISES_DATA.find(e => e.id === this.state.exerciseId);
                        const item = ex.items.find(i => i.kanji === card.dataset.value);
                        if (item) card.classList.add(item.color, item.bg);
                    }
                } else {
                    card.className = 'card-draggable font-sans bg-gray-800 border-2 border-gray-700 rounded-xl px-4 py-2.5 cursor-pointer shadow flex items-center justify-center gap-2 select-none min-w-[5.5rem] text-center';
                }
                
                document.getElementById('cards-container').appendChild(card);
            },

            handleCardClick: function(cardElement) {
                if (cardElement.parentElement.classList.contains('drop-zone')) {
                    this.returnCardToPool(cardElement);
                    this.clearSelection();
                    return;
                }
                this.clearSelection();
                this.state.selectedCard = cardElement;
                cardElement.classList.add('selected');
            },

            handleSlotClick: function(slotElement) {
                if (this.state.selectedCard) {
                    this.placeCardInSlot(this.state.selectedCard, slotElement);
                    this.clearSelection();
                } else if (slotElement.children.length > 0) {
                    this.returnCardToPool(slotElement.children[0]);
                }
            },

            handleDrop: function(e, slotElement) {
                e.preventDefault();
                slotElement.classList.remove('drag-over');
                
                const draggedValue = e.dataTransfer.getData('text/plain');
                // Buscar tanto por kanji como por traducción
                const card = document.querySelector(`.card-draggable[data-value="${draggedValue}"]`);
                
                if (card) {
                    this.placeCardInSlot(card, slotElement);
                }
                this.clearSelection();
            },

            placeCardInSlot: function(card, slot) {
                if (slot.children.length > 0) {
                    this.returnCardToPool(slot.children[0]);
                }
                card.classList.remove('selected', 'dragging');
                card.style.width = '100%';
                card.style.height = '100%';
                slot.appendChild(card);
            },

            clearSelection: function() {
                if (this.state.selectedCard) {
                    this.state.selectedCard.classList.remove('selected');
                }
                this.state.selectedCard = null;
            },

            // Normalización para comprobaciones de texto seguras (especialmente en Español)
            normalizeSpanishText: function(str) {
                return str.toLowerCase()
                    .normalize("NFD")
                    .replace(/[\u0300-\u036f]/g, "") // Eliminar acentos
                    .replace(/[^\w\s/]/g, "") // Eliminar símbolos de puntuación salvo barras de alternativas
                    .replace(/\s+/g, " ") // Colapsar espacios extra
                    .trim();
            },

            // --- COMPROBACIÓN Y CALIFICACIÓN ---
            checkAnswers: function() {
                const slots = document.querySelectorAll('.drop-zone, .jp-input');
                let allCorrect = true;
                let answered = 0;
                const total = slots.length;

                slots.forEach(slot => {
                    const isWriting = this.state.difficulty === 'writing';
                    const parentSlot = isWriting ? slot.parentElement : slot;
                    const expected = parentSlot.dataset.expected;
                    const altExpected = parentSlot.dataset.altExpected;

                    let isSlotCorrect = false;

                    if (isWriting) {
                        const userInput = slot.value.trim();
                        if (userInput !== '') {
                            answered++;
                            if (!this.state.inverted) {
                                // Modo Normal: Escribe en Japonés (Kanji o Kana)
                                if (userInput.toLowerCase() === expected.toLowerCase() || 
                                   (altExpected && userInput.toLowerCase() === altExpected.toLowerCase())) {
                                    isSlotCorrect = true;
                                }
                            } else {
                                // Modo Invertido: Escribe en Español
                                const normUser = this.normalizeSpanishText(userInput);
                                const normExpected = this.normalizeSpanishText(expected);
                                
                                // Permitir coincidencia si contiene barra lateral alternativa (ej: "Y / Y además")
                                if (normUser === normExpected) {
                                    isSlotCorrect = true;
                                } else {
                                    // Comprobar por sub-conceptos de forma amigable para evitar frustraciones al usuario
                                    const subAlternatives = normExpected.split("/");
                                    const matchesAlternative = subAlternatives.some(alt => normUser === alt.trim());
                                    
                                    if (matchesAlternative || normExpected.includes(normUser) && normUser.length >= 3) {
                                        isSlotCorrect = true;
                                    }
                                }
                            }
                        }
                    } else {
                        // Modo Drag & Drop
                        if (slot.children.length > 0) {
                            answered++;
                            const cardValue = slot.children[0].dataset.value;
                            if (cardValue === expected) {
                                isSlotCorrect = true;
                            }
                        }
                    }

                    // Dar feedback visual
                    if (isWriting && slot.value.trim() !== '') {
                        slot.classList.remove('text-white', 'text-green-400', 'text-red-400', 'border-gray-700', 'border-green-500', 'border-red-500');
                        if (isSlotCorrect) {
                            slot.classList.add('text-green-400', 'border-green-500');
                        } else {
                            slot.classList.add('text-red-400', 'border-red-500');
                            allCorrect = false;
                        }
                    } else if (!isWriting && slot.children.length > 0) {
                        const card = slot.children[0];
                        card.className = 'card-draggable rounded-xl px-4 py-2.5 cursor-pointer shadow flex items-center justify-center gap-2 select-none min-w-[5.5rem] text-center border-2';
                        
                        if (this.state.inverted) {
                            card.classList.add('font-sans');
                        } else {
                            card.classList.add('font-jp');
                        }

                        if (isSlotCorrect) {
                            card.classList.add('border-green-500', 'bg-green-900/30');
                        } else {
                            card.classList.add('border-red-500', 'bg-red-900/30');
                            allCorrect = false;
                        }
                    } else {
                        allCorrect = false;
                    }
                });

                // Caja de feedback inferior
                const feedback = document.getElementById('feedback-message');
                feedback.classList.remove('hidden', 'bg-green-900/40', 'text-green-400', 'bg-red-900/40', 'text-red-400', 'bg-yellow-900/40', 'text-yellow-400');
                
                if (answered < total) {
                    feedback.textContent = `Faltan ${total - answered} respuestas por completar. ¡Tú puedes!`;
                    feedback.classList.add('bg-yellow-900/40', 'text-yellow-400');
                } else if (allCorrect) {
                    feedback.textContent = '¡Felicidades! Lo has resuelto todo perfecto. 🎉';
                    feedback.classList.add('bg-green-900/40', 'text-green-400');
                    document.getElementById('btn-check').classList.add('hidden');

                    // Guardar progreso de esta dificultad y dirección actual
                    this.markAsCompleted(this.state.exerciseId, this.state.difficulty, this.state.inverted);
                } else {
                    feedback.textContent = 'Hay algunos errores. Revisa las tarjetas de color rojo.';
                    feedback.classList.add('bg-red-900/40', 'text-red-400');
                }
            }
        };

        // Iniciar en el menú principal al cargar la ventana
        window.onload = () => {
            app.showView('menu');
        };
    </script>
</body>
